services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql1
    hostname: sql1
    user: "0:0"
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123!"  # Change this!
    volumes:
      - sqldata:/var/opt/mssql/data  # Persist data
    networks:
      - aspnet-network

volumes:
  sqldata:

networks:
  aspnet-network: